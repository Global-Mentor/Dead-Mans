openapi: 3.0.3
info:
  title: Dead-Mans API
  version: v1
  description: >
    Canonical transport contract for Dead-Mans: HTTP paths under /api and SignalR hubs
    documented in x-signalr. Regenerate frontend contracts after changes.
servers:
  - url: /api
paths:
  /game:
    get:
      operationId: getCurrentGameBoard
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Active, ready (registration), or latest finished game board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameBoardSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No active, ready, or finished game available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/setup:
    get:
      operationId: getDraftGameSetup
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Draft game setup snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSetupSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft game available for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createDraftGameSetup
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameSetupRequestDto'
      responses:
        '201':
          description: Draft game created for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSetupSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid game setup request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A draft game already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateDraftGameSetup
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameSetupRequestDto'
      responses:
        '200':
          description: Draft game setup saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSetupSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid game setup save request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft game available for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Draft setup version conflict; another session saved the draft first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteDraftGameSetup
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Draft game setup deleted from the database; uploaded cell images under the draft game media prefix are removed from object storage when possible
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft game available for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/setup/cells/{cellId}/media:
    post:
      operationId: uploadDraftGameSetupCellMedia
      security:
        - cookieAuth: []
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Cell media uploaded for the draft setup board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameBoardCellMediaDto'
        '400':
          description: Invalid upload request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft game or cell not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteDraftGameSetupCellMedia
      security:
        - cookieAuth: []
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Cell media deleted from the draft setup board
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft game, cell, or media not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/cells/{cellId}/open:
    post:
      operationId: openGameCell
      security:
        - cookieAuth: []
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Card opened or already open
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/lifecycle/open-registration:
    post:
      operationId: openGameRegistration
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Draft moved to ready; registration open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameLifecycleStateDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft or game not in expected state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ready/active game already exists or invalid slot configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/lifecycle/start:
    post:
      operationId: startGame
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Ready game moved to active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameLifecycleStateDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No ready game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Active game already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/lifecycle/finish:
    post:
      operationId: finishGame
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Active game moved to finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameLifecycleStateDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No active game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration:
    get:
      operationId: getGameRegistrationSnapshot
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Registration snapshot for the current ready game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameRegistrationSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registration is not open (no ready game)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/teams:
    get:
      operationId: listRegistrationTeams
      security:
        - cookieAuth: []
      responses:
        '200':
          description: All teams for admin review
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistrationTeamDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registration is not open (no ready game)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createRegistrationTeam
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRegistrationTeamRequestDto'
      responses:
        '201':
          description: Team created in a public slot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationTeamDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registration not open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: No slots or user already on a team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/teams/leave:
    post:
      operationId: leaveRegistrationTeam
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Left current team
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not on a team or registration not open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/teams/{teamId}/join:
    post:
      operationId: joinRegistrationTeam
      security:
        - cookieAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Joined team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationTeamDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Team not found or registration not open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Team full, not joinable, or user already on a team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/teams/{teamId}/confirm:
    post:
      operationId: confirmRegistrationTeam
      security:
        - cookieAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Team confirmed by admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationTeamDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Team not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Team cannot be confirmed (wrong status or roster size)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/teams/{teamId}/reject:
    post:
      operationId: rejectRegistrationTeam
      security:
        - cookieAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Team rejected and removed
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Team not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/invitations:
    post:
      operationId: createAdminRegistrationInvitation
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminInvitationRequestDto'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationInvitationDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Slot, user, or team not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Slot unavailable or pending invitation exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/invitations/{invitationId}/accept:
    post:
      operationId: acceptRegistrationInvitation
      security:
        - cookieAuth: []
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invitation accepted; team returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationTeamDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Invitation invalid or registration not open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Slot or team constraints violated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/invitations/{invitationId}/decline:
    post:
      operationId: declineRegistrationInvitation
      security:
        - cookieAuth: []
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Invitation declined
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Invitation invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/me:
    servers:
      - url: /
    get:
      operationId: getAuthSession
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current authenticated user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    servers:
      - url: /
    post:
      operationId: logoutAuthSession
      responses:
        '204':
          description: Session terminated
        '403':
          description: Logout request missing required API client header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/twitch/login:
    servers:
      - url: /
    get:
      operationId: startTwitchLogin
      responses:
        '302':
          description: Redirect to Twitch OAuth authorize endpoint
          headers:
            Location:
              description: Absolute redirect target URL
              schema:
                type: string
                format: uri
  /auth/twitch/callback:
    servers:
      - url: /
    get:
      operationId: handleTwitchCallback
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect back to frontend with auth result
          headers:
            Location:
              description: Absolute redirect target URL
              schema:
                type: string
                format: uri
components:
  responses:
    InternalServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: dm_auth
  schemas:
    GameBoardCellMediaDto:
      type: object
      required: [url]
      properties:
        url:
          type: string
    GameBoardCellDto:
      type: object
      required: [id, row, col, cellType, cost, state, media]
      properties:
        id:
          type: string
        row:
          type: integer
        col:
          type: integer
        cellType:
          type: string
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        cost:
          type: integer
        state:
          type: string
          enum: [closed, open]
        media:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellMediaDto'
    CreateGameSetupRequestDto:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
    UpdateGameSetupCellDto:
      type: object
      required: [row, col, cost]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Existing cell id. Omit for newly added board positions.
        row:
          type: integer
          minimum: 0
        col:
          type: integer
          minimum: 0
        title:
          type: string
          nullable: true
          maxLength: 200
        cost:
          type: integer
          minimum: 0
    UpdateGameSetupRequestDto:
      type: object
      required: [expectedVersion, title, rowLabels, colLabels, cells]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
          description: Board version the client last loaded; save fails with 409 when the draft changed elsewhere
        title:
          type: string
          minLength: 1
          maxLength: 200
        rowLabels:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 100
        colLabels:
          type: array
          minItems: 1
          maxItems: 12
          items:
            type: string
            minLength: 1
            maxLength: 100
        cells:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/UpdateGameSetupCellDto'
    GameSetupSnapshotDto:
      type: object
      required: [gameId, title, status, version, rows, cols, rowLabels, colLabels, cells]
      properties:
        gameId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft]
        version:
          type: integer
        rows:
          type: integer
        cols:
          type: integer
        rowLabels:
          type: array
          items:
            type: string
        colLabels:
          type: array
          items:
            type: string
        cells:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellDto'
    GameLifecycleStateDto:
      type: object
      required: [gameId, status]
      properties:
        gameId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ready, active, finished]
    RegistrationPlayerDto:
      type: object
      required: [userId, login, displayName]
      properties:
        userId:
          type: string
          format: uuid
        login:
          type: string
        displayName:
          type: string
    RegistrationTeamMemberDto:
      type: object
      required: [player, joinedAtUtc]
      properties:
        player:
          $ref: '#/components/schemas/RegistrationPlayerDto'
        joinedAtUtc:
          type: string
          format: date-time
    RegistrationTeamDto:
      type: object
      required:
        - teamId
        - slotIndex
        - slotAvailability
        - recruitmentOpen
        - status
        - members
      properties:
        teamId:
          type: string
          format: uuid
        slotIndex:
          type: integer
        slotAvailability:
          type: string
        reservedLabel:
          type: string
          nullable: true
        recruitmentOpen:
          type: boolean
        status:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationTeamMemberDto'
    RegistrationSlotDto:
      type: object
      required:
        - slotId
        - slotIndex
        - availability
        - isAvailableForNewTeam
      properties:
        slotId:
          type: string
          format: uuid
        slotIndex:
          type: integer
        availability:
          type: string
        reservedLabel:
          type: string
          nullable: true
        isAvailableForNewTeam:
          type: boolean
        teamId:
          type: string
          format: uuid
          nullable: true
        teamStatus:
          type: string
          nullable: true
    RegistrationInvitationDto:
      type: object
      required: [invitationId, slotId, slotIndex, status, createdAtUtc]
      properties:
        invitationId:
          type: string
          format: uuid
        slotId:
          type: string
          format: uuid
        slotIndex:
          type: integer
        teamId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
        createdAtUtc:
          type: string
          format: date-time
    GameRegistrationSnapshotDto:
      type: object
      required:
        - gameId
        - gameStatus
        - minPlayersPerTeam
        - maxPlayersPerTeam
        - slots
        - teams
        - myPendingInvitations
      properties:
        gameId:
          type: string
          format: uuid
        gameStatus:
          type: string
        minPlayersPerTeam:
          type: integer
        maxPlayersPerTeam:
          type: integer
        slots:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationSlotDto'
        teams:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationTeamDto'
        myTeam:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RegistrationTeamDto'
        myPendingInvitations:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationInvitationDto'
    CreateRegistrationTeamRequestDto:
      type: object
      required: [recruitmentOpen]
      properties:
        recruitmentOpen:
          type: boolean
    CreateAdminInvitationRequestDto:
      type: object
      required: [slotId, invitedUserId]
      properties:
        slotId:
          type: string
          format: uuid
        invitedUserId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
          nullable: true
    GameBoardSnapshotDto:
      type: object
      required: [gameId, title, status, version, rows, cols, rowLabels, colLabels, cells]
      properties:
        gameId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [ready, active, finished]
        version:
          type: integer
        rows:
          type: integer
        cols:
          type: integer
        rowLabels:
          type: array
          items:
            type: string
        colLabels:
          type: array
          items:
            type: string
        cells:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellDto'
    AuthRole:
      type: string
      enum: [admin, moderator, viewer]
    AuthSessionDto:
      type: object
      required: [userId, displayName, roles]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AuthRole'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
          nullable: true
          description: Stable machine-readable error code.
    GameCellOpenedEventDto:
      type: object
      required: [gameId, version, cell]
      description: SignalR payload for game-board hub event cellOpened.
      properties:
        gameId:
          type: string
        version:
          type: integer
        cell:
          $ref: '#/components/schemas/GameBoardCellDto'
    GameSetupDraftChangedEventDto:
      type: object
      description: >
        SignalR payload for game-setup hub event draftChanged. The server sends no JSON body;
        clients refetch GET /api/game/setup after receiving the event.
      additionalProperties: false
x-signalr:
  version: v1
  description: >
    SignalR hubs run on the backend origin (not under /api). Negotiate with cookie auth
    (same session as HTTP). Event names and hub paths are stable contract surface.
  hubs:
    gameBoard:
      path: /hubs/game-board
      security:
        - cookieAuth: []
      authorization:
        summary: Any authenticated panel user.
      serverEvents:
        cellOpened:
          summary: A board cell was opened by an admin.
          payload:
            $ref: '#/components/schemas/GameCellOpenedEventDto'
      clientEvents: {}
    gameSetup:
      path: /hubs/game-setup
      security:
        - cookieAuth: []
      authorization:
        summary: Admin role required (enforced in GameSetupHub).
      serverEvents:
        draftChanged:
          summary: Draft setup changed; clients resync from GET /api/game/setup.
          payload:
            $ref: '#/components/schemas/GameSetupDraftChangedEventDto'
      clientEvents: {}
