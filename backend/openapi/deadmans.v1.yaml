openapi: 3.0.3
info:
  title: Dead-Mans API
  version: v1
  description: >
    Canonical transport contract for Dead-Mans: HTTP paths under /api and SignalR hubs
    documented in x-signalr. Regenerate frontend contracts after changes.
servers:
  - url: /api
paths:
  /game:
    get:
      operationId: getCurrentGameBoard
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Active, ready (registration), or latest finished game board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameBoardSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No active, ready, or finished game available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/modifiers/catalog:
    get:
      operationId: getGameModifierCatalog
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Global catalog of supported game modifiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameModifierDefinitionDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game/modifiers/{modifierCode}/activate:
    post:
      operationId: activateGameModifier
      security:
        - cookieAuth: []
      parameters:
        - name: modifierCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Modifier activated for the current active game
        '400':
          description: User id could not be resolved from auth cookie claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing moderator/admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown modifier code or no active game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Modifier not enabled for the game or already active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/questions/catalog:
    get:
      operationId: getGameQuestionCatalog
      security:
        - cookieAuth: []
      parameters:
        - name: vectorCode
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: includeDisabled
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Question catalog for vector management
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameQuestionCatalogItemDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game/questions/{questionId}/enabled:
    patch:
      operationId: setGameQuestionEnabled
      security:
        - cookieAuth: []
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetGameQuestionEnabledRequestDto'
      responses:
        '204':
          description: Question enable flag updated
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Question not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game/questions/{questionId}:
    delete:
      operationId: deleteGameQuestion
      security:
        - cookieAuth: []
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Question soft-deleted from catalog
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Question not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game/questions/categories/{category}/enabled:
    patch:
      operationId: setGameQuestionCategoryEnabled
      security:
        - cookieAuth: []
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
        - name: vectorCode
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetGameQuestionCategoryEnabledRequestDto'
      responses:
        '204':
          description: Category enable flag updated for matching questions
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game/questions/ask-next:
    post:
      operationId: askNextGameQuestion
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Next question selected and round created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskedGameQuestionDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing moderator/admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No active game or no available questions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game/questions/rounds/{roundId}/answer:
    post:
      operationId: answerGameQuestionRound
      security:
        - cookieAuth: []
      parameters:
        - name: roundId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerGameQuestionRequestDto'
      responses:
        '200':
          description: Question round answered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameQuestionRoundSummaryDto'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing moderator/admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Round not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Round already closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game/questions/games/{gameId}/history:
    get:
      operationId: getGameQuestionHistory
      security:
        - cookieAuth: []
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Asked question history for a game
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameQuestionRoundSummaryDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing moderator/admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game/history/users/{userId}:
    get:
      operationId: getUserGameHistory
      security:
        - cookieAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User activity history grouped by games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserGameHistoryItemDto'
        '400':
          description: Invalid auth cookie claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied for another user's history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game/setup:
    get:
      operationId: getDraftGameSetup
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Draft game setup snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSetupSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft game available for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createDraftGameSetup
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameSetupRequestDto'
      responses:
        '201':
          description: Draft game created for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSetupSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid game setup request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A draft game already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateDraftGameSetup
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameSetupRequestDto'
      responses:
        '200':
          description: Draft game setup saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSetupSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid game setup save request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft game available for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Draft setup version conflict; another session saved the draft first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteDraftGameSetup
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Draft game setup hard-deleted from the database; uploaded cell images under the draft game media prefix are removed from object storage when possible
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft game available for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/setup/cells/{cellId}/media:
    post:
      operationId: uploadDraftGameSetupCellMedia
      security:
        - cookieAuth: []
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Cell media uploaded for the draft setup board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameBoardCellMediaDto'
        '400':
          description: Invalid upload request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft game or cell not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteDraftGameSetupCellMedia
      security:
        - cookieAuth: []
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Cell media deleted from the draft setup board
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft game, cell, or media not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/cells/{cellId}/open:
    post:
      operationId: openGameCell
      security:
        - cookieAuth: []
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Card opened or already open
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/lifecycle/open-registration:
    post:
      operationId: openGameRegistration
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Draft moved to ready; registration open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameLifecycleStateDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft or game not in expected state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ready/active game already exists or invalid slot configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/lifecycle/start:
    post:
      operationId: startGame
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Ready game moved to active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameLifecycleStateDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No ready game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Active game already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/lifecycle/finish:
    post:
      operationId: finishGame
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Active game moved to finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameLifecycleStateDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No active game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/lifecycle/games/{gameId}:
    delete:
      operationId: archiveGame
      security:
        - cookieAuth: []
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Non-draft game archived via soft-delete
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Draft games must be deleted through game setup draft deletion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration:
    get:
      operationId: getGameRegistrationSnapshot
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Registration snapshot for the current ready game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameRegistrationSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registration is not open (no ready game)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/teams:
    get:
      operationId: listRegistrationTeams
      security:
        - cookieAuth: []
      responses:
        '200':
          description: All teams for admin review
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistrationTeamDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registration is not open (no ready game)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createRegistrationTeam
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRegistrationTeamRequestDto'
      responses:
        '201':
          description: Team created in a public slot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationTeamDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registration not open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: No slots or user already on a team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/teams/leave:
    post:
      operationId: leaveRegistrationTeam
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Left current team
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not on a team or registration not open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/teams/{teamId}/join:
    post:
      operationId: joinRegistrationTeam
      security:
        - cookieAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Joined team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationTeamDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Team not found or registration not open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Team full, not joinable, or user already on a team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/teams/{teamId}/confirm:
    post:
      operationId: confirmRegistrationTeam
      security:
        - cookieAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Team confirmed by admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationTeamDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Team not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Team cannot be confirmed (wrong status or roster size)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/teams/{teamId}/reject:
    post:
      operationId: rejectRegistrationTeam
      security:
        - cookieAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Team rejected and removed
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Team not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/invitations:
    post:
      operationId: createAdminRegistrationInvitation
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminInvitationRequestDto'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationInvitationDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Slot, user, or team not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Slot unavailable or pending invitation exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/invitations/{invitationId}/accept:
    post:
      operationId: acceptRegistrationInvitation
      security:
        - cookieAuth: []
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invitation accepted; team returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationTeamDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Invitation invalid or registration not open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Slot or team constraints violated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/registration/invitations/{invitationId}/decline:
    post:
      operationId: declineRegistrationInvitation
      security:
        - cookieAuth: []
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Invitation declined
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Invitation invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/me:
    servers:
      - url: /
    get:
      operationId: getAuthSession
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current authenticated user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    servers:
      - url: /
    post:
      operationId: logoutAuthSession
      responses:
        '204':
          description: Session terminated
        '403':
          description: Logout request missing required API client header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/twitch/login:
    servers:
      - url: /
    get:
      operationId: startTwitchLogin
      responses:
        '302':
          description: Redirect to Twitch OAuth authorize endpoint
          headers:
            Location:
              description: Absolute redirect target URL
              schema:
                type: string
                format: uri
  /auth/twitch/callback:
    servers:
      - url: /
    get:
      operationId: handleTwitchCallback
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect back to frontend with auth result
          headers:
            Location:
              description: Absolute redirect target URL
              schema:
                type: string
                format: uri
components:
  responses:
    InternalServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: dm_auth
  schemas:
    GameBoardCellMediaDto:
      type: object
      required: [url]
      properties:
        url:
          type: string
    GameBoardCellDto:
      type: object
      required: [id, row, col, cellType, cost, state, media]
      properties:
        id:
          type: string
        row:
          type: integer
        col:
          type: integer
        cellType:
          type: string
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        cost:
          type: integer
        state:
          type: string
          enum: [closed, open]
        media:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellMediaDto'
    CreateGameSetupRequestDto:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
    UpdateGameSetupCellDto:
      type: object
      required: [row, col, cost]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Existing cell id. Omit for newly added board positions.
        row:
          type: integer
          minimum: 0
        col:
          type: integer
          minimum: 0
        title:
          type: string
          nullable: true
          maxLength: 200
        cost:
          type: integer
          minimum: 0
    UpdateGameSetupRequestDto:
      type: object
      required: [expectedVersion, title, rowLabels, colLabels, cells, enabledModifierCodes]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
          description: Board version the client last loaded; save fails with 409 when the draft changed elsewhere
        title:
          type: string
          minLength: 1
          maxLength: 200
        rowLabels:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 100
        colLabels:
          type: array
          minItems: 1
          maxItems: 12
          items:
            type: string
            minLength: 1
            maxLength: 100
        cells:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/UpdateGameSetupCellDto'
        enabledModifierCodes:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 64
    GameSetupSnapshotDto:
      type: object
      required:
        [gameId, title, status, version, rows, cols, rowLabels, colLabels, cells, enabledModifierCodes]
      properties:
        gameId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft]
        version:
          type: integer
        rows:
          type: integer
        cols:
          type: integer
        rowLabels:
          type: array
          items:
            type: string
        colLabels:
          type: array
          items:
            type: string
        cells:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellDto'
        enabledModifierCodes:
          type: array
          items:
            type: string
    GameLifecycleStateDto:
      type: object
      required: [gameId, status]
      properties:
        gameId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ready, active, finished]
    RegistrationPlayerDto:
      type: object
      required: [userId, login, displayName]
      properties:
        userId:
          type: string
          format: uuid
        login:
          type: string
        displayName:
          type: string
    RegistrationTeamMemberDto:
      type: object
      required: [player, joinedAtUtc]
      properties:
        player:
          $ref: '#/components/schemas/RegistrationPlayerDto'
        joinedAtUtc:
          type: string
          format: date-time
    RegistrationTeamDto:
      type: object
      required:
        - teamId
        - slotIndex
        - slotAvailability
        - recruitmentOpen
        - status
        - members
      properties:
        teamId:
          type: string
          format: uuid
        slotIndex:
          type: integer
        slotAvailability:
          type: string
        reservedLabel:
          type: string
          nullable: true
        recruitmentOpen:
          type: boolean
        status:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationTeamMemberDto'
    RegistrationSlotDto:
      type: object
      required:
        - slotId
        - slotIndex
        - availability
        - isAvailableForNewTeam
      properties:
        slotId:
          type: string
          format: uuid
        slotIndex:
          type: integer
        availability:
          type: string
        reservedLabel:
          type: string
          nullable: true
        isAvailableForNewTeam:
          type: boolean
        teamId:
          type: string
          format: uuid
          nullable: true
        teamStatus:
          type: string
          nullable: true
    RegistrationInvitationDto:
      type: object
      required: [invitationId, slotId, slotIndex, status, createdAtUtc]
      properties:
        invitationId:
          type: string
          format: uuid
        slotId:
          type: string
          format: uuid
        slotIndex:
          type: integer
        teamId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
        createdAtUtc:
          type: string
          format: date-time
    GameRegistrationSnapshotDto:
      type: object
      required:
        - gameId
        - gameStatus
        - minPlayersPerTeam
        - maxPlayersPerTeam
        - slots
        - teams
        - myPendingInvitations
      properties:
        gameId:
          type: string
          format: uuid
        gameStatus:
          type: string
        minPlayersPerTeam:
          type: integer
        maxPlayersPerTeam:
          type: integer
        slots:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationSlotDto'
        teams:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationTeamDto'
        myTeam:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RegistrationTeamDto'
        myPendingInvitations:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationInvitationDto'
    CreateRegistrationTeamRequestDto:
      type: object
      required: [recruitmentOpen]
      properties:
        recruitmentOpen:
          type: boolean
    CreateAdminInvitationRequestDto:
      type: object
      required: [slotId, invitedUserId]
      properties:
        slotId:
          type: string
          format: uuid
        invitedUserId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
          nullable: true
    GameBoardSnapshotDto:
      type: object
      required:
        - gameId
        - title
        - status
        - version
        - rows
        - cols
        - rowLabels
        - colLabels
        - cells
        - enabledModifierCodes
        - activeModifiers
      properties:
        gameId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [ready, active, finished]
        version:
          type: integer
        rows:
          type: integer
        cols:
          type: integer
        rowLabels:
          type: array
          items:
            type: string
        colLabels:
          type: array
          items:
            type: string
        cells:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellDto'
        enabledModifierCodes:
          type: array
          items:
            type: string
        activeModifiers:
          type: array
          items:
            $ref: '#/components/schemas/GameModifierActivationDto'
    GameModifierDefinitionDto:
      type: object
      required:
        - code
        - kind
        - category
        - scoringType
        - tier
        - name
        - description
        - activationCost
      properties:
        code:
          type: string
        kind:
          type: string
          enum: [active, passive]
        category:
          type: string
        scoringType:
          type: string
        tier:
          type: string
          enum: [low, mid, high]
        name:
          type: string
        description:
          type: string
        activationCost:
          type: integer
          minimum: 0
        defaultLimitPerGame:
          type: integer
          nullable: true
          minimum: 1
        iconEmoji:
          type: string
          nullable: true
        activationCommand:
          type: string
          nullable: true
    GameModifierActivationDto:
      type: object
      required: [modifierCode, activatedByUserId, activatedAtUtc]
      properties:
        modifierCode:
          type: string
        activatedByUserId:
          type: string
          format: uuid
        activatedAtUtc:
          type: string
          format: date-time
    GameQuestionCatalogItemDto:
      type: object
      required:
        - questionId
        - vectorCode
        - questionCode
        - category
        - text
        - answer
        - reward
        - isEnabled
        - askedTotalCount
        - correctTotalCount
      properties:
        questionId:
          type: string
          format: uuid
        vectorCode:
          type: string
        questionCode:
          type: string
        category:
          type: string
        text:
          type: string
        answer:
          type: string
        reward:
          type: integer
          minimum: 0
        isEnabled:
          type: boolean
        askedTotalCount:
          type: integer
          minimum: 0
        correctTotalCount:
          type: integer
          minimum: 0
        lastAskedAtUtc:
          type: string
          format: date-time
          nullable: true
    SetGameQuestionEnabledRequestDto:
      type: object
      required: [isEnabled]
      properties:
        isEnabled:
          type: boolean
    SetGameQuestionCategoryEnabledRequestDto:
      type: object
      required: [isEnabled]
      properties:
        isEnabled:
          type: boolean
    AskedGameQuestionDto:
      type: object
      required:
        - roundId
        - gameId
        - askOrder
        - questionId
        - vectorCode
        - questionCode
        - category
        - text
        - reward
        - askedAtUtc
      properties:
        roundId:
          type: string
          format: uuid
        gameId:
          type: string
          format: uuid
        askOrder:
          type: integer
          minimum: 1
        questionId:
          type: string
          format: uuid
        vectorCode:
          type: string
        questionCode:
          type: string
        category:
          type: string
        text:
          type: string
        reward:
          type: integer
          minimum: 0
        askedAtUtc:
          type: string
          format: date-time
    AnswerGameQuestionRequestDto:
      type: object
      required: [answer]
      properties:
        answer:
          type: string
          minLength: 1
          maxLength: 500
        answeredByDisplayName:
          type: string
          nullable: true
          maxLength: 128
        answeredForUserId:
          type: string
          format: uuid
          nullable: true
    GameQuestionRoundSummaryDto:
      type: object
      required:
        - roundId
        - gameId
        - askOrder
        - questionId
        - questionText
        - category
        - reward
        - status
        - askedAtUtc
      properties:
        roundId:
          type: string
          format: uuid
        gameId:
          type: string
          format: uuid
        askOrder:
          type: integer
          minimum: 1
        questionId:
          type: string
          format: uuid
        questionText:
          type: string
        category:
          type: string
        reward:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [asked, answered_correct, answered_wrong, timeout, skipped]
        askedAtUtc:
          type: string
          format: date-time
        answeredAtUtc:
          type: string
          format: date-time
          nullable: true
        answeredByDisplayName:
          type: string
          nullable: true
        answeredByUserId:
          type: string
          format: uuid
          nullable: true
        answeredForUserId:
          type: string
          format: uuid
          nullable: true
        submittedAnswer:
          type: string
          nullable: true
        isCorrect:
          type: boolean
          nullable: true
        awardedPoints:
          type: integer
          nullable: true
          minimum: 0
    UserGameModifierActivationHistoryItemDto:
      type: object
      required: [modifierCode, activatedAtUtc]
      properties:
        modifierCode:
          type: string
        activatedAtUtc:
          type: string
          format: date-time
    UserGameQuestionAnswerHistoryItemDto:
      type: object
      required:
        - roundId
        - questionId
        - questionText
        - category
        - answeredAtUtc
        - isCorrect
        - awardedPoints
      properties:
        roundId:
          type: string
          format: uuid
        questionId:
          type: string
          format: uuid
        questionText:
          type: string
        category:
          type: string
        answeredAtUtc:
          type: string
          format: date-time
        isCorrect:
          type: boolean
        awardedPoints:
          type: integer
          minimum: 0
        submittedAnswer:
          type: string
          nullable: true
        answeredByUserId:
          type: string
          format: uuid
          nullable: true
    UserGameHistoryItemDto:
      type: object
      required:
        - gameId
        - gameTitle
        - gameStatus
        - createdAtUtc
        - modifierActivations
        - questionAnswers
      properties:
        gameId:
          type: string
          format: uuid
        gameTitle:
          type: string
        gameStatus:
          type: string
        createdAtUtc:
          type: string
          format: date-time
        startedAtUtc:
          type: string
          format: date-time
          nullable: true
        finishedAtUtc:
          type: string
          format: date-time
          nullable: true
        modifierActivations:
          type: array
          items:
            $ref: '#/components/schemas/UserGameModifierActivationHistoryItemDto'
        questionAnswers:
          type: array
          items:
            $ref: '#/components/schemas/UserGameQuestionAnswerHistoryItemDto'
    AuthRole:
      type: string
      enum: [admin, moderator, viewer]
    AuthSessionDto:
      type: object
      required: [userId, displayName, roles]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AuthRole'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
          nullable: true
          description: Stable machine-readable error code.
          enum:
            - game_board.not_found
            - game_board.cell_not_found
            - game_setup.no_draft
            - game_setup.draft_exists
            - game_setup.invalid_title
            - game_setup.invalid_save_request
            - game_setup.cell_not_found
            - game_setup.cell_media_not_found
            - game_setup.invalid_cell_media_upload
            - game_setup.stale_version
            - game_lifecycle.draft_not_found
            - game_lifecycle.ready_already_exists
            - game_lifecycle.active_already_exists
            - game_lifecycle.game_not_ready
            - game_lifecycle.game_not_active
            - game_lifecycle.registration_slots_required
            - game_lifecycle.invalid_team_size_limits
            - game_lifecycle.operation_failed
            - game_lifecycle.draft_delete_not_allowed
            - game_lifecycle.game_not_found
            - game_common.unexpected_server_error
            - game_registration.not_open
            - game_registration.no_slots
            - game_registration.already_on_team
            - game_registration.team_not_found
            - game_registration.team_not_joinable
            - game_registration.not_team_member
            - game_registration.invitation_invalid
            - game_registration.slot_not_found
            - game_registration.slot_not_available
            - game_registration.user_not_found
            - game_registration.pending_invitation
            - game_registration.operation_failed
            - game_modifier.unknown_code
            - game_modifier.game_not_active
            - game_modifier.not_enabled
            - game_modifier.conflict_active
            - game_modifier.limit_reached
            - game_modifier.user_not_resolved
            - game_question.invalid_request
            - game_question.not_found
            - game_question.no_active_game
            - game_question.no_available_questions
            - game_question.round_not_found
            - game_question.round_not_pending
        requestId:
          type: string
          nullable: true
          description: Server request correlation identifier for diagnostics.
    GameCellOpenedEventDto:
      type: object
      required: [gameId, version, cell]
      description: SignalR payload for game-board hub event cellOpened.
      properties:
        gameId:
          type: string
        version:
          type: integer
        cell:
          $ref: '#/components/schemas/GameBoardCellDto'
    GameModifierActivatedEventDto:
      type: object
      required: [gameId, version, activation]
      description: SignalR payload for game-board hub event modifierActivated.
      properties:
        gameId:
          type: string
        version:
          type: integer
        activation:
          $ref: '#/components/schemas/GameModifierActivationDto'
    GameSetupDraftChangedEventDto:
      type: object
      description: >
        SignalR payload for game-setup hub event draftChanged. The server sends no JSON body;
        clients refetch GET /api/game/setup after receiving the event.
      additionalProperties: false
x-signalr:
  version: v1
  description: >
    SignalR hubs run on the backend origin (not under /api). Negotiate with cookie auth
    (same session as HTTP). Event names and hub paths are stable contract surface.
  hubs:
    gameBoard:
      path: /hubs/game-board
      security:
        - cookieAuth: []
      authorization:
        summary: Any authenticated panel user.
      serverEvents:
        cellOpened:
          summary: A board cell was opened by an admin.
          payload:
            $ref: '#/components/schemas/GameCellOpenedEventDto'
        modifierActivated:
          summary: A game modifier was activated by a moderator or admin.
          payload:
            $ref: '#/components/schemas/GameModifierActivatedEventDto'
      clientEvents: {}
    gameSetup:
      path: /hubs/game-setup
      security:
        - cookieAuth: []
      authorization:
        summary: Admin role required (enforced in GameSetupHub).
      serverEvents:
        draftChanged:
          summary: Draft setup changed; clients resync from GET /api/game/setup.
          payload:
            $ref: '#/components/schemas/GameSetupDraftChangedEventDto'
      clientEvents: {}
