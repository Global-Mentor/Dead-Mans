openapi: 3.0.3
info:
  title: Dead-Mans API
  version: v1
  description: Canonical transport contract for Dead-Mans panel APIs.
servers:
  - url: /api
paths:
  /health:
    get:
      operationId: getHealthStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatusResponse'
  /leaderboard:
    get:
      operationId: getLeaderboard
      responses:
        '200':
          description: Leaderboard snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardSummaryDto'
        '503':
          description: Feature is temporarily unavailable until persistence is configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /loadout:
    get:
      operationId: getLoadoutBoard
      responses:
        '200':
          description: Loadout board snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadoutBoardDto'
        '503':
          description: Loadout board is not available yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /loadout/{cellId}/toggle:
    post:
      operationId: toggleLoadoutCellState
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated loadout board snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadoutBoardDto'
        '400':
          description: Invalid cell id or cell not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected error while toggling the loadout cell
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game:
    get:
      operationId: getCurrentGameBoard
      responses:
        '200':
          description: Active game board or latest finished game board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameBoardSnapshotDto'
        '404':
          description: No active or finished game available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /modifiers:
    get:
      operationId: getModifiers
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Available and active modifiers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifiersSnapshotDto'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Feature is temporarily unavailable until persistence is configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /modifiers/activate:
    post:
      operationId: activateModifier
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivateModifierRequest'
      responses:
        '200':
          description: Updated modifiers snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifiersSnapshotDto'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Feature is temporarily unavailable until persistence is configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game-state:
    get:
      operationId: getGameState
      responses:
        '200':
          description: Current game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameControlStateDto'
        '503':
          description: Feature is temporarily unavailable until persistence is configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game-state/start:
    post:
      operationId: startGame
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Updated game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameControlStateDto'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Feature is temporarily unavailable until persistence is configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game-state/pause:
    post:
      operationId: pauseGame
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Updated game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameControlStateDto'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Feature is temporarily unavailable until persistence is configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game-state/resume:
    post:
      operationId: resumeGame
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Updated game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameControlStateDto'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Feature is temporarily unavailable until persistence is configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game-state/next-round:
    post:
      operationId: nextRound
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Updated game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameControlStateDto'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Feature is temporarily unavailable until persistence is configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game-state/reset:
    post:
      operationId: resetGame
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Updated game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameControlStateDto'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Feature is temporarily unavailable until persistence is configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    servers:
      - url: /
    get:
      operationId: getAuthSession
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current authenticated user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    servers:
      - url: /
    post:
      operationId: logoutAuthSession
      responses:
        '204':
          description: Session terminated
  /auth/twitch/login:
    servers:
      - url: /
    get:
      operationId: startTwitchLogin
      responses:
        '302':
          description: Redirect to Twitch OAuth authorize endpoint
          headers:
            Location:
              description: Absolute redirect target URL
              schema:
                type: string
                format: uri
  /auth/twitch/callback:
    servers:
      - url: /
    get:
      operationId: handleTwitchCallback
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect back to frontend with auth result
          headers:
            Location:
              description: Absolute redirect target URL
              schema:
                type: string
                format: uri
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: dm_auth
  schemas:
    HealthStatusResponse:
      type: object
      required: [status, environment, serverTimeUtc]
      properties:
        status:
          type: string
        environment:
          type: string
        serverTimeUtc:
          type: string
          format: date-time
    LeaderboardTeamDto:
      type: object
      required: [id, name, colorHex, score, penalty]
      properties:
        id:
          type: string
        name:
          type: string
        colorHex:
          type: string
        score:
          type: integer
        penalty:
          type: integer
    LeaderboardSummaryDto:
      type: object
      required: [updatedAt, teams]
      properties:
        updatedAt:
          type: string
          format: date-time
        teams:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardTeamDto'
    LoadoutCellDto:
      type: object
      required: [id, row, col, label, points, state]
      properties:
        id:
          type: string
        row:
          type: integer
        col:
          type: integer
        label:
          type: string
        points:
          type: integer
        imageUrl:
          type: string
          nullable: true
        state:
          type: string
          enum: [closed, open]
    LoadoutBoardDto:
      type: object
      required: [rows, cols, rowLabels, colLabels, cells]
      properties:
        rows:
          type: integer
        cols:
          type: integer
        rowLabels:
          type: array
          items:
            type: string
        colLabels:
          type: array
          items:
            type: string
        cells:
          type: array
          items:
            $ref: '#/components/schemas/LoadoutCellDto'
    ModifierDefinitionDto:
      type: object
      required: [id, name, cost, description]
      properties:
        id:
          type: string
        name:
          type: string
        cost:
          type: integer
        description:
          type: string
    ActiveModifierDto:
      type: object
      required: [id, modifierId, activatedAt, triggeredBy]
      properties:
        id:
          type: string
        modifierId:
          type: string
        activatedAt:
          type: string
          format: date-time
        triggeredBy:
          type: string
    ModifiersSnapshotDto:
      type: object
      required: [available, active]
      properties:
        available:
          type: array
          items:
            $ref: '#/components/schemas/ModifierDefinitionDto'
        active:
          type: array
          items:
            $ref: '#/components/schemas/ActiveModifierDto'
    ActivateModifierRequest:
      type: object
      required: [modifierId, triggeredBy]
      properties:
        modifierId:
          type: string
        triggeredBy:
          type: string
    GameControlStateDto:
      type: object
      required: [phase, currentRound, totalRounds, lastActionAt]
      properties:
        phase:
          type: string
          enum: [idle, running, paused, finished]
        currentRound:
          type: integer
        totalRounds:
          type: integer
        lastActionAt:
          type: string
          format: date-time
          nullable: true
    GameBoardCellMediaDto:
      type: object
      required: [url]
      properties:
        url:
          type: string
    GameBoardCellDto:
      type: object
      required: [id, row, col, cellType, cost, state, media]
      properties:
        id:
          type: string
        row:
          type: integer
        col:
          type: integer
        cellType:
          type: string
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        cost:
          type: integer
        state:
          type: string
          enum: [closed, open]
        media:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellMediaDto'
    GameBoardSnapshotDto:
      type: object
      required: [gameId, title, status, rows, cols, rowLabels, colLabels, cells]
      properties:
        gameId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, finished]
        rows:
          type: integer
        cols:
          type: integer
        rowLabels:
          type: array
          items:
            type: string
        colLabels:
          type: array
          items:
            type: string
        cells:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellDto'
    AuthRole:
      type: string
      enum: [admin, moderator, viewer]
    AuthSessionDto:
      type: object
      required: [userId, displayName, roles]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AuthRole'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
