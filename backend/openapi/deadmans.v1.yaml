openapi: 3.0.3
info:
  title: Dead-Mans API
  version: v1
  description: Canonical transport contract for Dead-Mans auth and game-board APIs.
servers:
  - url: /api
paths:
  /game:
    get:
      operationId: getCurrentGameBoard
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Active game board or latest finished game board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameBoardSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No active or finished game available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /game/cells/{cellId}/open:
    post:
      operationId: openGameCell
      security:
        - cookieAuth: []
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Card opened or already open
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    servers:
      - url: /
    get:
      operationId: getAuthSession
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current authenticated user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    servers:
      - url: /
    post:
      operationId: logoutAuthSession
      responses:
        '204':
          description: Session terminated
  /auth/twitch/login:
    servers:
      - url: /
    get:
      operationId: startTwitchLogin
      responses:
        '302':
          description: Redirect to Twitch OAuth authorize endpoint
          headers:
            Location:
              description: Absolute redirect target URL
              schema:
                type: string
                format: uri
  /auth/twitch/callback:
    servers:
      - url: /
    get:
      operationId: handleTwitchCallback
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect back to frontend with auth result
          headers:
            Location:
              description: Absolute redirect target URL
              schema:
                type: string
                format: uri
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: dm_auth
  schemas:
    GameBoardCellMediaDto:
      type: object
      required: [url]
      properties:
        url:
          type: string
    GameBoardCellDto:
      type: object
      required: [id, row, col, cellType, cost, state, media]
      properties:
        id:
          type: string
        row:
          type: integer
        col:
          type: integer
        cellType:
          type: string
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        cost:
          type: integer
        state:
          type: string
          enum: [closed, open]
        media:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellMediaDto'
    GameBoardSnapshotDto:
      type: object
      required: [gameId, title, status, version, rows, cols, rowLabels, colLabels, cells]
      properties:
        gameId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, finished]
        version:
          type: integer
        rows:
          type: integer
        cols:
          type: integer
        rowLabels:
          type: array
          items:
            type: string
        colLabels:
          type: array
          items:
            type: string
        cells:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellDto'
    AuthRole:
      type: string
      enum: [admin, moderator, viewer]
    AuthSessionDto:
      type: object
      required: [userId, displayName, roles]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AuthRole'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
