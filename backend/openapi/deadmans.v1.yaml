openapi: 3.0.3
info:
  title: Dead-Mans API
  version: v1
  description: >
    Canonical transport contract for Dead-Mans: HTTP paths under /api and SignalR hubs
    documented in x-signalr. Regenerate frontend contracts after changes.
servers:
  - url: /api
paths:
  /game:
    get:
      operationId: getCurrentGameBoard
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Active game board or latest finished game board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameBoardSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No active or finished game available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/setup:
    get:
      operationId: getDraftGameSetup
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Draft game setup snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSetupSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft game available for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createDraftGameSetup
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameSetupRequestDto'
      responses:
        '201':
          description: Draft game created for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSetupSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid game setup request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A draft game already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateDraftGameSetup
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameSetupRequestDto'
      responses:
        '200':
          description: Draft game setup saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSetupSnapshotDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid game setup save request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft game available for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Draft setup version conflict; another session saved the draft first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteDraftGameSetup
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Draft game setup deleted from the database; uploaded cell images under the draft game media prefix are removed from object storage when possible
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No draft game available for setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/setup/cells/{cellId}/media:
    post:
      operationId: uploadDraftGameSetupCellMedia
      security:
        - cookieAuth: []
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Cell media uploaded for the draft setup board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameBoardCellMediaDto'
        '400':
          description: Invalid upload request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft game or cell not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteDraftGameSetupCellMedia
      security:
        - cookieAuth: []
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Cell media deleted from the draft setup board
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft game, cell, or media not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /game/cells/{cellId}/open:
    post:
      operationId: openGameCell
      security:
        - cookieAuth: []
      parameters:
        - name: cellId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Card opened or already open
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/me:
    servers:
      - url: /
    get:
      operationId: getAuthSession
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current authenticated user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    servers:
      - url: /
    post:
      operationId: logoutAuthSession
      responses:
        '204':
          description: Session terminated
        '403':
          description: Logout request missing required API client header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/twitch/login:
    servers:
      - url: /
    get:
      operationId: startTwitchLogin
      responses:
        '302':
          description: Redirect to Twitch OAuth authorize endpoint
          headers:
            Location:
              description: Absolute redirect target URL
              schema:
                type: string
                format: uri
  /auth/twitch/callback:
    servers:
      - url: /
    get:
      operationId: handleTwitchCallback
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect back to frontend with auth result
          headers:
            Location:
              description: Absolute redirect target URL
              schema:
                type: string
                format: uri
components:
  responses:
    InternalServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: dm_auth
  schemas:
    GameBoardCellMediaDto:
      type: object
      required: [url]
      properties:
        url:
          type: string
    GameBoardCellDto:
      type: object
      required: [id, row, col, cellType, cost, state, media]
      properties:
        id:
          type: string
        row:
          type: integer
        col:
          type: integer
        cellType:
          type: string
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        cost:
          type: integer
        state:
          type: string
          enum: [closed, open]
        media:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellMediaDto'
    CreateGameSetupRequestDto:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
    UpdateGameSetupCellDto:
      type: object
      required: [row, col, cost]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Existing cell id. Omit for newly added board positions.
        row:
          type: integer
          minimum: 0
        col:
          type: integer
          minimum: 0
        title:
          type: string
          nullable: true
          maxLength: 200
        cost:
          type: integer
          minimum: 0
    UpdateGameSetupRequestDto:
      type: object
      required: [expectedVersion, title, rowLabels, colLabels, cells]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
          description: Board version the client last loaded; save fails with 409 when the draft changed elsewhere
        title:
          type: string
          minLength: 1
          maxLength: 200
        rowLabels:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 100
        colLabels:
          type: array
          minItems: 1
          maxItems: 12
          items:
            type: string
            minLength: 1
            maxLength: 100
        cells:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/UpdateGameSetupCellDto'
    GameSetupSnapshotDto:
      type: object
      required: [gameId, title, status, version, rows, cols, rowLabels, colLabels, cells]
      properties:
        gameId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft]
        version:
          type: integer
        rows:
          type: integer
        cols:
          type: integer
        rowLabels:
          type: array
          items:
            type: string
        colLabels:
          type: array
          items:
            type: string
        cells:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellDto'
    GameBoardSnapshotDto:
      type: object
      required: [gameId, title, status, version, rows, cols, rowLabels, colLabels, cells]
      properties:
        gameId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, finished]
        version:
          type: integer
        rows:
          type: integer
        cols:
          type: integer
        rowLabels:
          type: array
          items:
            type: string
        colLabels:
          type: array
          items:
            type: string
        cells:
          type: array
          items:
            $ref: '#/components/schemas/GameBoardCellDto'
    AuthRole:
      type: string
      enum: [admin, moderator, viewer]
    AuthSessionDto:
      type: object
      required: [userId, displayName, roles]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AuthRole'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
          nullable: true
          description: Stable machine-readable error code.
    GameCellOpenedEventDto:
      type: object
      required: [gameId, version, cell]
      description: SignalR payload for game-board hub event cellOpened.
      properties:
        gameId:
          type: string
        version:
          type: integer
        cell:
          $ref: '#/components/schemas/GameBoardCellDto'
    GameSetupDraftChangedEventDto:
      type: object
      description: >
        SignalR payload for game-setup hub event draftChanged. The server sends no JSON body;
        clients refetch GET /api/game/setup after receiving the event.
      additionalProperties: false
x-signalr:
  version: v1
  description: >
    SignalR hubs run on the backend origin (not under /api). Negotiate with cookie auth
    (same session as HTTP). Event names and hub paths are stable contract surface.
  hubs:
    gameBoard:
      path: /hubs/game-board
      security:
        - cookieAuth: []
      authorization:
        summary: Any authenticated panel user.
      serverEvents:
        cellOpened:
          summary: A board cell was opened by an admin.
          payload:
            $ref: '#/components/schemas/GameCellOpenedEventDto'
      clientEvents: {}
    gameSetup:
      path: /hubs/game-setup
      security:
        - cookieAuth: []
      authorization:
        summary: Admin role required (enforced in GameSetupHub).
      serverEvents:
        draftChanged:
          summary: Draft setup changed; clients resync from GET /api/game/setup.
          payload:
            $ref: '#/components/schemas/GameSetupDraftChangedEventDto'
      clientEvents: {}
