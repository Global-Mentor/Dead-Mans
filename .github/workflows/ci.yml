name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-architecture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run backend architecture guardrails
        run: dotnet test backend/tests/Backend.Tests/Backend.Tests.csproj --filter "FullyQualifiedName~Architecture|FullyQualifiedName~DomainErrorHttpPolicyTests"

  build:
    runs-on: ubuntu-latest
    needs: backend-architecture

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Generate frontend transport artifacts
        run: npm --prefix frontend run generate:transport

      - name: Validate OpenAPI contract
        run: npx --yes swagger-cli validate backend/openapi/deadmans.v1.yaml

      - name: Verify generated transport artifacts are up to date
        run: git diff --exit-code -- frontend/src/shared/api/contracts frontend/src/shared/realtime/generated.ts

      - name: Build backend
        run: dotnet build backend/backend.slnx

      - name: Test backend
        run: dotnet test backend/backend.slnx --no-build

      - name: Frontend quality gate
        run: npm --prefix frontend run check

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Audit root npm dependencies
        run: npm audit --audit-level=high

      - name: Audit frontend npm dependencies
        run: npm --prefix frontend audit --audit-level=high

      - name: Restore backend
        run: dotnet restore backend/backend.slnx

      - name: Audit backend NuGet dependencies
        run: |
          set -euo pipefail
          report="$(dotnet list backend/backend.slnx package --vulnerable --include-transitive)"
          echo "$report"
          if echo "$report" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected."
            exit 1
          fi
