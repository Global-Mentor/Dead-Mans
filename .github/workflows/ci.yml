name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install root tooling
        run: npm install

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Generate frontend contracts
        run: npm run generate:contracts

      - name: Validate OpenAPI contract
        run: npx --yes swagger-cli validate backend/openapi/deadmans.v1.yaml

      - name: Verify generated contracts are up to date
        run: git diff --exit-code -- frontend/src/shared/api/contracts

      - name: Build backend
        run: npm run build:backend

      - name: Test backend
        run: dotnet test backend/backend.slnx --no-build

      - name: Lint frontend
        run: npm --prefix frontend run lint

      - name: Build frontend
        run: npm run build:frontend
